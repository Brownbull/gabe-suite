<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{SUBJECT_TITLE}} · {{PROJECT_NAME}} Command Center</title>
<link rel="stylesheet" href="assets/a3.css">
</head>
<body>
<div class="app">

{{SIDEBAR}}  <!-- identical shell to index.html's aside.side; the current subject's .navitem carries class "on" -->

<main class="main">
  <div class="topbar">
    <div class="crumb"><a href="index.html">Overview</a> › <b>{{SUBJECT_TITLE}}</b></div>
    <div class="spacer"></div>
    {{STATUS_PILLS}}
    <span class="stamp">synced · {{SYNC_AGE}}</span>
  </div>

  <div class="subject">
    <div class="subjecthead">
      <div class="pagehead">
        <h1>{{SUBJECT_TITLE}}</h1>
        <p>{{SUBJECT_LEDE}}</p>
      </div>
      {{SUBJECT_HEADLINE_STATS}}
    </div>

    <!-- The four-tab set is the SAME on every subject page — the shell's self-similarity is
         the navigation contract. Pure-CSS :target tabs — no script. -->
    <nav class="tabbar">
      <a href="#tab-overview">Overview</a>
      <a href="#tab-tests">Tests</a>
      <a href="#tab-evidence">Evidence</a>
      <a href="#tab-risk">Risk</a>
    </nav>

    <div class="tabbody">
      <section class="tabpane" id="tab-overview">{{TAB_OVERVIEW}}</section>
      <section class="tabpane" id="tab-tests">{{TAB_TESTS}}</section>
      <section class="tabpane" id="tab-evidence">{{TAB_EVIDENCE}}</section>
      <section class="tabpane" id="tab-risk">{{TAB_RISK}}</section>
    </div>
  </div>
</main>

</div>
</body>
</html>
